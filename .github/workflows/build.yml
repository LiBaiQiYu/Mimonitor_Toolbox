name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pyqt6 PyQt6-Fluent-Widgets

      - name: Build exe
        run: >
          pyinstaller --onefile --windowed --name "MonitorToolbox"
          --icon=icon.ico
          --hidden-import qfluentwidgets
          --add-binary "adb.exe;."
          --add-binary "AdbWinApi.dll;."
          --add-binary "AdbWinUsbApi.dll;."
          --add-binary "MtkDirectTool.jar;."
          monitor_controller.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MonitorToolbox.exe
          generate_release_notes: true
